analyzer_rules:
  - capture_variable
type_name:
  max_length:
    warning: 60
    error: 60
generic_type_name:
  max_length:
    warning: 60
    error: 60
identifier_name:
  allowed_symbols: "_"
  max_length:
    warning: 60
    error: 60
  min_length:
    warning: 1
